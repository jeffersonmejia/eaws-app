<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EAWS</title>
  <style>
    :root {
      --green: #1f8f58;
      --green-bright: #0f6f42;
      --text: #10261a;
      --text-muted: #496254;
      --page: #c9ded4;
      --surface: rgba(255,255,255,0.62);
      --surface-strong: rgba(255,255,255,0.86);
      --glass-sheen: linear-gradient(145deg, #ffffffb8 0%, #ffffff5e 42%, #1f8f5818 100%);
      --border: rgba(82,120,99,0.3);
      --border-strong: rgba(31,143,88,0.5);
    }
    [data-theme="dark"] {
      --green: #5fe49a;
      --green-bright: #9cffc5;
      --text: #f0fff6;
      --text-muted: #bdd8c8;
      --page: #07140e;
      --surface: rgba(28,55,40,0.76);
      --surface-strong: rgba(42,78,57,0.92);
      --glass-sheen: linear-gradient(145deg, #ffffff2e 0%, #ffffff12 42%, #5fe49a24 100%);
      --border: rgba(182,255,211,0.28);
      --border-strong: rgba(95,228,154,0.55);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui,-apple-system,sans-serif; background: var(--page); color: var(--text); transition: background 0.25s, color 0.25s; }
    .glass-strong {
      background: var(--glass-sheen), var(--surface-strong);
      background-blend-mode: screen, normal;
      backdrop-filter: blur(30px) saturate(200%) contrast(1.04);
      -webkit-backdrop-filter: blur(30px) saturate(200%) contrast(1.04);
      border: 1px solid var(--border);
    }
    .glass-btn {
      background: transparent;
      transition: background 0.15s, transform 0.15s;
    }
    .glass-btn:hover { background: var(--surface-strong); }
    .glass-btn:active { transform: scale(0.97); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
  </style>
  <script type="module" crossorigin src="/assets/index-DrF-kwXm.js"></script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
